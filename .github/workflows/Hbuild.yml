name: Miatoll Kernel Builder (Android 15 & KVM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev clang llvm lld libncurses-dev ccache git zip python3

      - name: Fetch Toolchain (Proton Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git ${{ github.workspace }}/proton-clang

      - name: Build Kernel
        env:
          ARCH: arm64
          SUBARCH: arm64
          PATH: ${{ github.workspace }}/proton-clang/bin:${{ env.PATH }}
        run: |
          # Create output directory
          rm -r out
          mkdir -p out
          
          # 1. Configure with the exact path you found
          make O=out ARCH=arm64 vendor/curtana_defconfig
          
          # 2. Force Enable KVM and Android 15 features
          scripts/config --file out/.config -e KVM
          scripts/config --file out/.config -e VIRTUALIZATION
          scripts/config --file out/.config -e KVM_ARM_HOST
          scripts/config --file out/.config -e KVM_ARM_PMU
          scripts/config --file out/.config -e VHOST_NET
          scripts/config --file out/.config -e BPF_SYSCALL
          scripts/config --file out/.config -e BPF_JIT
          
          # 3. Start the actual compilation
          make -j$(nproc --all) O=out \
              ARCH=arm64 \
              CC=clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              LD=ld.lld

      - name: Package Kernel
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          # Identify and copy the compiled image
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/
          fi
          cd AnyKernel3
          zip -r9 ../Miatoll-Android15-KVM-Kernel.zip * -x .git README.md

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Zip-Package
          path: Miatoll-Android15-KVM-Kernel.zip
