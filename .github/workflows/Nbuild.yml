name: Miatoll Kernel Builder (Android 15 & KVM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev clang llvm lld libncurses-dev ccache git zip python3

      - name: Fetch Toolchains (Original Script Style)
        run: |
          # Clang
          git clone --depth=1 https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-6443078 clang
          # GCC 64-bit
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
          # GCC 32-bit
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32

      - name: Build Kernel
        env:
          ARCH: arm64
          KBUILD_BUILD_HOST: android-build
          KBUILD_BUILD_USER: "kardebayan"
        run: |
          # Path setting matching your script
          export PATH="${PWD}/clang/bin:${PWD}/gcc64/bin:${PWD}/gcc32/bin:${PATH}"
          rm -r out
          mkdir -p out
          
          # 1. Configuration (Matching your script path)
          make O=out ARCH=arm64 vendor/xiaomi/miatoll_defconfig
          
          # 3. Start Compilation
          make -j$(nproc --all) O=out \
                      ARCH=arm64 \
                      CC="clang" \
                      CLANG_TRIPLE=aarch64-linux-gnu- \
                      CROSS_COMPILE="${PWD}/gcc64/bin/aarch64-linux-android-" \
                      CROSS_COMPILE_ARM32="${PWD}/gcc32/bin/arm-linux-androideabi-" \
                      LD=ld.lld \
                      CONFIG_NO_ERROR_ON_MISMATCH=y

      - name: Package Kernel (AnyKernel3)
        run: |
          # Using the specific branch r5x from your script
          git clone --depth=1 https://github.com/Amritorock/AnyKernel3 -b r5x AnyKernel
          if [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel/
            cd AnyKernel
            zip -r9 ../Miatoll-Android15-KVM-Kernel.zip *
          else
            echo "Kernel Image.gz not found! Check build logs."
            exit 1
          fi

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Zip-Package
          path: Miatoll-Android15-KVM-Kernel.zip
