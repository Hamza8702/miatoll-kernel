
name: Miatoll Kernel Build CI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel Task
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

            - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm clang libssl-dev libelf-dev zip curl tar git python3


      - name: Execute Build Script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stormbreaker-Kernel-Miatoll
          path: "*.zip"

