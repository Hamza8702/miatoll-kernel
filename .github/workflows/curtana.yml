      - name: Compile Kernel
        env:
          ARCH: arm64
          KBUILD_BUILD_HOST: android-build
          KBUILD_BUILD_USER: "kardebayan"
        run: |
          # Step 1: Export Toolchain Paths
          export PATH="${PWD}/clang/bin:${PWD}/gcc64/bin:${PWD}/gcc32/bin:${PATH}"
          
          # Step 2: Create Output Directory
          mkdir -p out
          
          # Step 3: Generate Base Configuration
          # Note: Replace 'miatoll_defconfig' with your actual base defconfig name if different
          make O=out ARCH=arm64 miatoll_defconfig
          
          # Step 4: Append Custom Linux Fragments (Hamza.config)
          # We merge your custom settings (KVM, Systemd, etc.) into the base .config
          cat vendor/xiaomi/Hamza.config >> out/.config
          
          # Step 5: Finalize Configuration and Solve Dependencies
          # This ensures that your custom flags are compatible with the kernel version
          make O=out ARCH=arm64 olddefconfig
          
          # Step 6: Start Full Kernel Compilation
          make -j$(nproc --all) O=out \
                      ARCH=arm64 \
                      CC="clang" \
                      CLANG_TRIPLE=aarch64-linux-gnu- \
                      CROSS_COMPILE="${PWD}/gcc64/bin/aarch64-linux-android-" \
                      CROSS_COMPILE_ARM32="${PWD}/gcc32/bin/arm-linux-androideabi-" \
                      LD=ld.lld \
                      CONFIG_NO_ERROR_ON_MISMATCH=y
